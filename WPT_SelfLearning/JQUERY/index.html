<!DOCTYPE html>
<html>
<head>
    <title>jQuery Traversal and DOM Manipulation</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial;
            margin: 20px;
        }

        .box{
            border: 2px solid black;
            padding: 15px;
            margin-bottom: 20px;
        }

        button{
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }

        table{
            border-collapse: collapse;
            width: 60%;
            margin-top: 20px;
        }

        table, th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        input{
            padding: 6px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h1>jQuery Traversal Methods</h1>

    <div class="box" id="mainBox">

        <h2>Heading Element</h2>

        <p id="para">
            This is paragraph text.
            <span>
                <b>Bold Text Inside Span</b>
            </span>
        </p>

        <div id="siblingDiv">Sibling Div</div>

    </div>

    <!-- Buttons -->
    <button id="parentBtn">parent()</button>
    <button id="childrenBtn">children()</button>
    <button id="findBtn">find()</button>
    <button id="siblingsBtn">siblings()</button>

    <hr>

    <h1>Student Form using jQuery DOM Manipulation</h1>

    <label>Student Name:</label>
    <input type="text" id="sname">

    <label>Course:</label>
    <input type="text" id="course">

    <button id="addBtn">Add Student</button>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Course</th>
            </tr>
        </thead>

        <tbody id="tableBody">

        </tbody>
    </table>

    <script>

        $(document).ready(function(){

            // parent()
            $("#parentBtn").click(function(){

                $("#para").parent()
                .css("background","lightyellow");

            });

            // children()
            $("#childrenBtn").click(function(){

                $("#mainBox").children()
                .css("color","blue");

            });

            // find()
            $("#findBtn").click(function(){

                $("#mainBox").find("b")
                .css("color","red");

            });

            // siblings()
            $("#siblingsBtn").click(function(){

                $("#para").siblings()
                .css("background","lightgreen");

            });

            // Add student data into table
            $("#addBtn").click(function(){

                var name = $("#sname").val();
                var course = $("#course").val();

                if(name != "" && course != "")
                {
                    var row = "<tr><td>" + name + "</td><td>" + course + "</td></tr>";

                    $("#tableBody").append(row);

                    // Clear inputs
                    $("#sname").val("");
                    $("#course").val("");
                }
                else
                {
                    alert("Please enter all fields");
                }

            });

        });

    </script>

</body>
</html>
