<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
      <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form>
                    <h3>Sign-UP</h3>
                    <div class="mb-3">
                        <label for="exampleInputName1" class="form-label">Name</label>
                        <input type="text" class="form-control" id="exampleInputName1"  placeholder="Enter Name">
                       
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter Email address">
                        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Password</label>
                        <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Enter Password">
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputMobile1" class="form-label">Mobile</label>
                        <input type="tel" class="form-control" id="exampleInputMobile1" placeholder="Enter Mobile no" minlength="10" maxlength="10">
                    </div>
                   
                   
                    <button type="submit" class="btn btn-success">Sign-UP</button>
                    <button type="submit" class="btn btn-danger">cancel</button>
                </form>

            </div>

        </div>
    
</body>
</html>
